cases:
  - name: 01_有效管理员创建记录成功
    thought: 使用本次运行创建的上级记录标识，验证有效管理员创建记录后返回data=true。
    mockId: null
    users:
      - "test-user"
    requestRef: 01_有效管理员创建记录成功.json
    expectRef: 01_有效管理员创建记录成功.json
    request:
      base:
        parent_id: __DATA_REF:parent_record.id__
        role_code: ADMIN
        record_type: STANDARD
        _enum:
          role_code:
            管理员: ADMIN
            审核员: REVIEWER
          record_type:
            标准: STANDARD
            临时: TEMPORARY
      overrides: {}
    expect:
      base:
        data: true
      overrides: {}
    fieldHints:
      - field: parent_id
        kind: runtime-business-data
        semantic: 本次运行创建的上级记录
        valueSource: record.create_parent
        placeholder: __DATA_REF:parent_record.id__
        required: true
      - field: role_code
        kind: business-enum
        semantic: 管理员
        valueSource: request._enum.role_code
        required: true
